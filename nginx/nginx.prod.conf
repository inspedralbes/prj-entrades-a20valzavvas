events {}

http {
    # ── HTTP ──────────────────────────────────────────────────────────────────
    # Phase 1 (before SSL): proxies traffic normally so the app is accessible.
    # Phase 2 (after SSL):  replace the proxy locations below with a redirect:
    #     location / { return 301 https://$host$request_uri; }
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge (certbot webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ── WebSocket (Socket.IO / NestJS) ────────────────────────────────────
        location /ws/ {
            proxy_pass http://backend:3001/;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            proxy_read_timeout 3600s;
        }

        # ── REST API (Laravel) ────────────────────────────────────────────────
        location /api {
            proxy_pass http://laravel-service:8000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # ── Frontend (Nuxt 3) ─────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend:3000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── HTTPS (uncomment after obtaining SSL certificate) ─────────────────────
    # SETUP:
    #   1. Deploy with this block commented out (HTTP only, above).
    #   2. Obtain cert:
    #        docker compose -f docker-compose.prod.yml run --rm certbot certonly \
    #          --webroot --webroot-path=/var/www/certbot \
    #          --email YOUR_EMAIL --agree-tos -d YOUR_DOMAIN
    #   3. Replace YOUR_DOMAIN below, uncomment this block, add HTTP redirect above,
    #      then reload: docker compose -f docker-compose.prod.yml exec nginx nginx -s reload
    #
    # server {
    #     listen 443 ssl;
    #     server_name YOUR_DOMAIN;
    #
    #     ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    #
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
