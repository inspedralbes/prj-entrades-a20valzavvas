services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── NestJS backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: src/backend/node-service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${BACKEND_PORT:-3001}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  # ── Nuxt 3 frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
    environment:
      NITRO_PORT: ${FRONTEND_PORT:-3000}
      NUXT_LARAVEL_BASE_URL: http://laravel-service:8000
    depends_on:
      - backend

  # ── Laravel Service ────────────────────────────────────────────────────────
  laravel-service:
    build:
      context: ./src/backend/laravel-service
      dockerfile: Dockerfile
    environment:
      APP_ENV: local
      APP_KEY: ${LARAVEL_APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Shared with the Node Service — must be identical in both services
      JWT_SECRET: ${JWT_SECRET}
      SANCTUM_TOKEN_TTL: ${SANCTUM_TOKEN_TTL:-60}
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-3000}
      SESSION_DRIVER: file
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx reverse proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - laravel-service

# ── Named volumes ──────────────────────────────────────────────────────────
volumes:
  db-data:
