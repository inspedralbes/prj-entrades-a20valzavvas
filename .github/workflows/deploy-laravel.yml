name: Deploy Laravel Service

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          base: ${{ github.event.workflow_run.head_branch || github.ref }}
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          filters: |
            laravel:
              - 'src/backend/laravel-service/**'

      - name: Log in to GHCR
        if: steps.changes.outputs.laravel == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Laravel image
        if: steps.changes.outputs.laravel == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend/laravel-service
          file: ./src/backend/laravel-service/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-laravel:latest

      - name: Deploy to VPS
        if: steps.changes.outputs.laravel == 'true' || github.event_name == 'workflow_dispatch'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR
          script: |
            set -e
            cd /opt/entrades
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            docker compose -f docker-compose.prod.yml pull laravel-service
            docker compose -f docker-compose.prod.yml up -d laravel-service
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
