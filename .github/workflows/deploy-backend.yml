name: Deploy Backend

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          base: ${{ github.event.workflow_run.head_branch || github.ref }}
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          filters: |
            backend:
              - 'src/backend/node-service/**'
              - 'src/shared/**'

      - name: Sync files to server
        if: steps.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude ".git" --exclude ".github"
          path: ./
          remote_path: /opt/entrades/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_KEY }}

      - name: Write .env from secret
        if: steps.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/entrades
            printf '%s\n' '${{ secrets.BACKEND_ENV_FILE }}' > .env
            sed -i 's/^[[:space:]]*//' .env
            chmod 600 .env

      - name: Deploy backend
        if: steps.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/entrades
            docker compose -f docker-compose.prod.yml up -d --build backend
            docker image prune -f
