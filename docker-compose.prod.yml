services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── NestJS backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: src/backend/node-service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${BACKEND_PORT:-3001}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      LARAVEL_INTERNAL_URL: ${LARAVEL_INTERNAL_URL:-http://laravel-service:8000}
    expose:
      - "3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Nuxt 3 frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
    environment:
      NITRO_PORT: ${FRONTEND_PORT:-3000}
      NUXT_LARAVEL_BASE_URL: http://laravel-service:8000
      NUXT_PUBLIC_WS_URL: ${NUXT_PUBLIC_WS_URL}
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Laravel Service ────────────────────────────────────────────────────────
  laravel-service:
    build:
      context: ./src/backend/laravel-service
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      APP_KEY: ${LARAVEL_APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      SANCTUM_TOKEN_TTL: ${SANCTUM_TOKEN_TTL:-60}
      FRONTEND_URL: ${FRONTEND_URL}
      SESSION_DRIVER: file
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${APP_NAME:-Sala Onirica}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
      - laravel-service
    restart: unless-stopped

  # ── Certbot (SSL — run manually: docker compose run --rm certbot) ──────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# ── Named volumes ──────────────────────────────────────────────────────────
volumes:
  db-data:
  certbot-www:
  certbot-conf:
